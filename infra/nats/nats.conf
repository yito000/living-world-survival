# NATS サーバー設定（M0）— JetStream + monitoring 有効化
# 03B 落とし穴: -js 忘れで永続ストリームが使えない → ここで確実に有効化する。

# クライアント接続
port: 4222

# HTTP monitoring（healthcheck: http://localhost:8222/healthz）
http_port: 8222

# JetStream（永続ストリーム）
jetstream {
  store_dir: "/data/jetstream"
  # M0 ローカル向けの控えめな上限
  max_memory_store: 268435456   # 256MB
  max_file_store: 1073741824    # 1GB
}
