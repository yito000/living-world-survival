name: ci

# Automatic CI is disabled while the failing pipeline is investigated.
# Run manually from the GitHub Actions UI when needed.
on:
  workflow_dispatch:

jobs:
  backend:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: survival
          POSTGRES_PASSWORD: survival
          POSTGRES_DB: survival
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U survival"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 20
    env:
      DATABASE_URL: postgres://survival:survival@localhost:5432/survival?sslmode=disable
      NATS_URL: nats://localhost:4222
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: install uv
        run: pip install uv

      - name: install buf
        uses: bufbuild/buf-action@v1
        with:
          setup_only: true

      # ローカルと同じ make target を呼ぶ（Blender 未導入のため assets は自動 skip）。
      - name: proto
        run: make proto
      - name: lint
        run: make lint
      - name: test
        run: make test
      - name: assets
        run: make assets

      # M7（10B 3.6）: security は軽量・高速なので PR CI に載せる。
      # postgres service だけで完結する範囲（compose の port 公開範囲・
      # Repo の secret 混入・ログ秘匿・MVP-SEC-00x の Go テスト）。
      # 負荷/soak/recovery は重い or DS 成果物依存なので nightly.yml へ。
      - name: security
        run: make security

      # Gate 未達や FAIL の内訳を後から数値で追えるようにする（第19.1 / AT-020）。
      - name: upload security reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: security-reports
          path: build/reports/
          if-no-files-found: ignore
